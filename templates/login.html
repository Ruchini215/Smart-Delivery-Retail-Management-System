<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceylex - Login & Register</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-wrapper">

    <!-- Splash Screen Loader -->
    <div id="splash-loader" class="splash-screen-overlay">
        <div class="splash-content">
            <div class="splash-logo-container">
                <div class="splash-logo-glow"></div><div class="splash-logo-inner"><img src="/static/img/logo_final.jpg" class="logo-img" alt="Logo"></div>
            </div>
            <h1 class="splash-title" style="margin-top: 1rem;">CEYLEX<span>.</span></h1>
            <p class="splash-subtitle">Premium Smart Grocery & Logistics</p>
            <div class="splash-progress-container">
                <div class="splash-progress-bar" id="splashProgressBar"></div>
            </div>
            <div class="splash-percentage" id="splashPercentage">0%</div>
            <div class="splash-status-text" id="splashStatusText">Initializing secure systems...</div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toastContainer"></div>

    <div class="glass-card auth-card">
        <div class="auth-header">
            <div style="display:flex; justify-content:center; margin-bottom:1rem;">
                <div class="splash-logo-inner" style="width: 70px; height: 70px; font-size: 2rem;"><img src="/static/img/logo_final.jpg" class="logo-img" alt="Logo"></div>
            </div>
            <h1>CEYLEX<span>.</span></h1>
            <p style="color:var(--text-muted); font-size:0.85rem; letter-spacing:1px; text-transform:uppercase;">Premium Smart Grocery & Logistics</p>
        </div>

        <!-- Tabs to switch Login / Register -->
        <div class="auth-tabs">
            <div class="auth-tab active" id="loginTabBtn" onclick="showAuthTab('login')">Login</div>
            <div class="auth-tab" id="registerTabBtn" onclick="showAuthTab('register')">Register</div>
        </div>

        <!-- 1. LOGIN FORM -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="loginUsername">Username</label>
                <input type="text" id="loginUsername" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <div style="position: relative;">
                    <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" required>
                    <i class="fa-solid fa-eye" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted);" onclick="togglePasswordVisibility('loginPassword', this)"></i>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>

        <!-- 2. REGISTER FORM (Initially Hidden) -->
        <form id="registerForm" onsubmit="handleRegister(event)" style="display: none;">
            <div class="form-group">
                <label for="registerUsername">Username</label>
                <input type="text" id="registerUsername" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label for="registerPassword">Password</label>
                <div style="position: relative;">
                    <input type="password" id="registerPassword" class="form-control" placeholder="Choose a password" required>
                    <i class="fa-solid fa-eye" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted);" onclick="togglePasswordVisibility('registerPassword', this)"></i>
                </div>
            </div>
            
            <div class="form-group">
                <label for="registerRole">Role Type</label>
                <select id="registerRole" class="form-control" onchange="toggleDriverFields()" required>
                    <option value="customer">Customer</option>
                    <option value="driver">Delivery Driver</option>
                    <option value="manager">Store Manager</option>
                </select>
            </div>

            <!-- Driver-Specific Fields (Visible only when 'driver' is selected) -->
            <div id="driverFields" style="display: none; border-top: 1px dashed var(--card-border); padding-top: 1rem; margin-top: 1rem;">
                <div class="form-group">
                    <label for="driverPhone">Contact Number</label>
                    <input type="text" id="driverPhone" class="form-control" placeholder="e.g. 0771234567" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10)">
                </div>

                <div class="form-group">
                    <label for="driverLicense">Driver's License Number</label>
                    <input type="text" id="driverLicense" class="form-control" placeholder="e.g. B1234567" oninput="this.value = this.value.toUpperCase().slice(0, 9)">
                </div>

                <div class="form-group">
                    <label for="driverHomeAddress">Home Address</label>
                    <input type="text" id="driverHomeAddress" class="form-control" placeholder="e.g. 12 Main St, Anuradhapura">
                </div>
                
                <div class="form-group">
                    <label for="driverArea">Home City / Region</label>
                    <select id="driverArea" class="form-control" onchange="autoFillCoords()">
                        <option value="Colombo">Colombo (Main Hub)</option>
                        <option value="Anuradhapura">Anuradhapura Hub</option>
                        <option value="Kandy">Kandy Hub</option>
                        <option value="Galle">Galle Hub</option>
                        <option value="Jaffna">Jaffna Hub</option>
                        <option value="Kurunegala">Kurunegala Hub</option>
                        <option value="Ratnapura">Ratnapura Hub</option>
                        <option value="Batticaloa">Batticaloa Hub</option>
                        <option value="Badulla">Badulla Hub</option>
                        <option value="Matara">Matara Hub</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="driverVehicle">Assigned Vehicle Type</label>
                    <select id="driverVehicle" class="form-control">
                        <option value="Motorbike">Motorbike (Max 15kg)</option>
                        <option value="Three-Wheeler">Three-Wheeler (Max 150kg)</option>
                        <option value="Mini Van">Mini Van (Max 600kg)</option>
                        <option value="Heavy Truck">Heavy Truck (Heavy load)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="driverRadius">Max Delivery Radius (km)</label>
                    <input type="number" step="any" id="driverRadius" class="form-control" value="50" placeholder="e.g. 50">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="driverLat">Latitude (Map)</label>
                        <input type="number" step="any" id="driverLat" class="form-control" value="6.9271">
                    </div>
                    <div class="form-group">
                        <label for="driverLng">Longitude (Map)</label>
                        <input type="number" step="any" id="driverLng" class="form-control" value="79.8612">
                    </div>
                </div>
                <small style="color:var(--text-muted); display:block; margin-bottom:1rem;">
                    Coordinates are automatically filled based on the selected Sri Lankan city.
                </small>
            </div>

            <button type="submit" class="btn btn-secondary btn-block">Create Account</button>
        </form>
    </div>

    <!-- Scripting for UI transitions and network calls -->
    <script src="/static/js/main.js"></script>
    <script>
        // Preset coordinates for 10 warehouses in Sri Lanka
        const cityCoordinates = {
            "Colombo": { lat: 6.9271, lng: 79.8612 },
            "Anuradhapura": { lat: 8.3122, lng: 80.4131 },
            "Kandy": { lat: 7.2906, lng: 80.6337 },
            "Galle": { lat: 6.0535, lng: 80.2117 },
            "Jaffna": { lat: 9.6615, lng: 80.0095 },
            "Kurunegala": { lat: 7.4863, lng: 80.3647 },
            "Ratnapura": { lat: 6.6828, lng: 80.3992 },
            "Batticaloa": { lat: 7.7172, lng: 81.7010 },
            "Badulla": { lat: 6.9934, lng: 81.0550 },
            "Matara": { lat: 5.9549, lng: 80.5550 }
        };

        function toggleDriverFields() {
            const role = document.getElementById("registerRole").value;
            const driverFields = document.getElementById("driverFields");
            if (role === "driver") {
                driverFields.style.display = "block";
                autoFillCoords();
            } else {
                driverFields.style.display = "none";
            }
        }

        function autoFillCoords() {
            const area = document.getElementById("driverArea").value;
            const coords = cityCoordinates[area];
            if (coords) {
                document.getElementById("driverLat").value = coords.lat;
                document.getElementById("driverLng").value = coords.lng;
            }
        }

        function togglePasswordVisibility(inputId, iconEl) {
            const input = document.getElementById(inputId);
            if (input) {
                if (input.type === 'password') {
                    input.type = 'text';
                    iconEl.classList.remove('fa-eye');
                    iconEl.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    iconEl.classList.remove('fa-eye-slash');
                    iconEl.classList.add('fa-eye');
                }
            }
        }

        function showAuthTab(type) {
            const loginForm = document.getElementById("loginForm");
            const registerForm = document.getElementById("registerForm");
            const loginBtn = document.getElementById("loginTabBtn");
            const regBtn = document.getElementById("registerTabBtn");

            if (type === "login") {
                loginForm.style.display = "block";
                registerForm.style.display = "none";
                loginBtn.classList.add("active");
                regBtn.classList.remove("active");
            } else {
                loginForm.style.display = "none";
                registerForm.style.display = "block";
                loginBtn.classList.remove("active");
                regBtn.classList.add("active");
            }
        }

    </script>
</body>
</html>
